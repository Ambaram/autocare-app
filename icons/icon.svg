<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="90" fill="#0a0f1e"/>
  <!-- Car body -->
  <rect x="60" y="280" width="392" height="110" rx="18" fill="#ff6b35"/>
  <!-- Cabin -->
  <path d="M130 280 L175 185 L338 185 L382 280 Z" fill="#ff6b35"/>
  <!-- Windshield -->
  <path d="M180 278 L200 205 L312 205 L332 278 Z" fill="#1e3a5f" opacity="0.85"/>
  <!-- Front wheel -->
  <circle cx="148" cy="395" r="50" fill="#1a2234" stroke="#ff6b35" stroke-width="8"/>
  <circle cx="148" cy="395" r="22" fill="#ff6b35"/>
  <!-- Rear wheel -->
  <circle cx="364" cy="395" r="50" fill="#1a2234" stroke="#ff6b35" stroke-width="8"/>
  <circle cx="364" cy="395" r="22" fill="#ff6b35"/>
  <!-- Headlight -->
  <rect x="65" y="300" width="35" height="20" rx="6" fill="#fcd34d"/>
  <!-- AI badge -->
  <circle cx="390" cy="130" r="88" fill="#ff6b35"/>
  <text x="390" y="115" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="white">AI</text>
  <text x="390" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="white">🔧</text>
</svg>
